<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bug's Forest ✨</title>
<style>
/* ── RESET ───────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#060410}

/* ── SCENE ───────────────────────────────────── */
#scene{
  position:fixed;inset:0;
  overflow:hidden;
}

/* ── FOREST BG (crossfade pair) ──────────────── */
#forest-base,#forest-next{
  position:absolute;inset:0;
  background:center center/cover no-repeat;
  pointer-events:none;
}
#forest-base{ background-image:url('forest.png'); } /* default fallback */
#forest-next{ opacity:0; transition:opacity 3s ease; }

/* Vignette always on top of both forest layers */
#vignette{
  position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 80% at 50% 60%, transparent 40%, rgba(4,2,12,.6) 100%);
  pointer-events:none;
}

/* ── FOG TIME-OF-DAY TINTS ───────────────────── */
#fog{ transition:filter 3s ease; }
#scene.period-dawn #fog{ filter:hue-rotate(60deg)  saturate(.65) brightness(1.35); }
#scene.period-day  #fog{ filter:hue-rotate(95deg)  saturate(.12) brightness(2.2);  }
#scene.period-dusk #fog{ filter:hue-rotate(-55deg) saturate(1.25) brightness(.9);  }

/* ── STARS TIME-OF-DAY ───────────────────────── */
#stars{ transition:opacity 3s ease; }
#scene.period-dawn #stars,
#scene.period-day  #stars{ opacity:0; pointer-events:none; }


/* ── FOG LAYERS ──────────────────────────────── */
#fog{position:absolute;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.fog-layer{position:absolute;border-radius:50%;will-change:transform,opacity;backface-visibility:hidden}

/* Layer 1 — ground fog bank: slow, breathing, low opacity */
.fog-1{
  width:200%;height:35%;
  left:-50%;bottom:-5%;
  background:radial-gradient(ellipse at 50% 90%,rgba(200,184,232,.48),rgba(74,42,110,.28) 45%,transparent 78%);
  filter:blur(22px);
  animation:fog1 8s ease-in-out infinite;
  animation-delay:0s;
}
@keyframes fog1{
  0%  {transform:translateX(0)  scaleX(1);    opacity:0}
  50% {transform:translateX(8%) scaleX(1.04); opacity:.55}
  100%{transform:translateX(0)  scaleX(1);    opacity:0}
}

/* Layer 2 — low-mid drift: medium speed, teal-blue */
.fog-2{
  width:170%;height:28%;
  left:-35%;bottom:8%;
  background:radial-gradient(ellipse at 48% 70%,rgba(184,216,232,.40),rgba(26,58,90,.25) 50%,transparent 78%);
  filter:blur(28px);
  animation:fog2 5.5s ease-in-out infinite;
  animation-delay:-1.4s;
}
@keyframes fog2{
  0%  {transform:translateX(0)    scaleY(1);    opacity:0}
  50% {transform:translateX(-10%) scaleY(1.05); opacity:.50}
  100%{transform:translateX(0)    scaleY(1);    opacity:0}
}

/* Layer 3 — hero rolling bank: very slow, covers mid-scene */
.fog-3{
  width:220%;height:55%;
  left:-60%;bottom:18%;
  background:radial-gradient(ellipse at 50% 55%,rgba(100,65,145,.36),rgba(74,42,110,.22) 40%,rgba(26,58,90,.10) 65%,transparent 84%);
  filter:blur(35px);
  animation:fog3 11s ease-in-out infinite;
  animation-delay:-5.5s;
}
@keyframes fog3{
  0%  {transform:translateX(0)   scale(1,1);      opacity:0}
  50% {transform:translateX(12%) scale(1.02,.98); opacity:.52}
  100%{transform:translateX(0)   scale(1,1);      opacity:0}
}

/* Layer 4 — upper mid: medium speed, teal */
.fog-4{
  width:160%;height:40%;
  left:-30%;bottom:30%;
  background:radial-gradient(ellipse at 55% 50%,rgba(184,216,232,.36),rgba(10,74,74,.22) 52%,transparent 80%);
  filter:blur(40px);
  animation:fog4 7s ease-in-out infinite;
  animation-delay:-2.8s;
}
@keyframes fog4{
  0%  {transform:translateX(0)   scaleX(1);   opacity:0}
  50% {transform:translateX(-8%) scaleX(.97); opacity:.48}
  100%{transform:translateX(0)   scaleX(1);   opacity:0}
}


/* ── BIRDS / BATS ────────────────────────────── */
#birds{position:absolute;inset:0;z-index:4;pointer-events:none}
.flock{position:absolute;pointer-events:none;will-change:transform;backface-visibility:hidden}
.bird{position:absolute;width:7px;height:4px;will-change:transform}
.bird::before,
.bird::after{
  content:'';
  position:absolute;
  top:0;
  width:3.5px;height:4px;
  border-top:2px solid rgba(15,8,28,.65);
  border-radius:50% 50% 0 0 / 100% 100% 0 0;
  animation-duration:.55s;
  animation-timing-function:ease-in-out;
  animation-iteration-count:infinite;
  animation-direction:alternate;
  animation-delay:var(--fd,0s);
}
.bird::before{left:0;transform-origin:100% 100%;animation-name:wingL}
.bird::after {left:3.5px;transform-origin:0% 100%;animation-name:wingR}
@keyframes wingL{from{transform:rotate(0deg)}to{transform:rotate(-20deg)}}
@keyframes wingR{from{transform:rotate(0deg)}to{transform:rotate( 20deg)}}

/* Bats — bigger, faster flap, pale against night sky */
.bat{position:absolute;width:10px;height:5px;will-change:transform}
.bat::before,
.bat::after{
  content:'';
  position:absolute;
  top:0;
  width:5px;height:5px;
  border-top:2px solid rgba(180,150,220,.7);
  border-radius:50% 50% 0 0 / 100% 100% 0 0;
  animation-duration:.28s;
  animation-timing-function:ease-in-out;
  animation-iteration-count:infinite;
  animation-direction:alternate;
  animation-delay:var(--fd,0s);
}
.bat::before{left:0;transform-origin:100% 100%;animation-name:batWingL}
.bat::after {left:5px;transform-origin:0% 100%;animation-name:batWingR}
@keyframes batWingL{from{transform:rotate(0deg)}to{transform:rotate(-35deg)}}
@keyframes batWingR{from{transform:rotate(0deg)}to{transform:rotate( 35deg)}}
@keyframes flockRight{
  from{transform:translateX(-200px)}
  to  {transform:translateX(calc(100vw + 200px))}
}
@keyframes flockLeft{
  from{transform:translateX(calc(100vw + 200px))}
  to  {transform:translateX(-200px)}
}


/* ── SPORE CLOUDS ────────────────────────────── */
#spores{position:absolute;inset:0;z-index:2;pointer-events:none}
/* spore particles are fully JS/rAF-driven — no CSS animation */

/* ── CRITTERS LAYER ──────────────────────────── */
#critters{position:absolute;inset:0;z-index:3;pointer-events:none;overflow:hidden;mix-blend-mode:screen}

/* ── BUG CONTAINER ───────────────────────────── */
/*  bug.png is 1024×1536, shown at 210px wide → 315px tall  */
#bug-wrap{
  position:absolute;
  bottom:calc(5% + 100px);
  left:50%;transform:translateX(-50%);
  width:210px;height:315px;
  transform-origin:center bottom;
  z-index:10;
  transition:transform .35s cubic-bezier(.25,.46,.45,.94), bottom .8s ease;
  will-change:transform;
  backface-visibility:hidden;
}

/* the actual image — multiply removes the black bg */
#bug-img{
  display:block;
  width:100%;height:100%;
  object-fit:contain;
  mix-blend-mode:multiply;
  transform-origin:center bottom;
  transition:filter .4s ease, transform .4s ease;
  pointer-events:none;
  will-change:transform,filter,opacity;
  backface-visibility:hidden;
}

/* sad state */
#bug-wrap.sad #bug-img{
  filter:saturate(.4) brightness(.85);
  transform:translateY(6px);
}

/* ── CLICK ZONES ─────────────────────────────── */
/* Hit zones are computed in JS via getBoundingClientRect() — no CSS divs needed. */
#bug-wrap{cursor:pointer}

/* ── FANCY OVERLAY (hat, mustache, monocle) ──── */
/* fancy.png is 1536×1024 — same proportions as the forest scene.
   Treated as a full-scene overlay so accessories land on Bug. */
#fancy{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;object-position:center center;
  pointer-events:none;z-index:18;
  opacity:0;
  transform-origin:50% 62%; /* rotate around Bug's face area */
  transition:opacity .2s;
}
#fancy.show{
  opacity:1;
  animation:fancyWig .5s ease-in-out infinite alternate;
}
@keyframes fancyWig{
  from{transform:rotate(-3deg)}
  to  {transform:rotate( 3deg)}
}
@keyframes fancyPop{
  0%  {opacity:1;transform:scale(1)}
  45% {opacity:.6;transform:scale(1.18)}
  100%{opacity:0;transform:scale(.25)}
}
#fancy.popping{animation:fancyPop .45s ease-in forwards}

/* ── EYELIDS ──────────────────────────────────── */
/* Approximate positions over Bug's eyeball locations in bug.png.
   Tune top/left/right if they don't land on her eyes perfectly. */



/* ── SPEECH BUBBLE ───────────────────────────── */
#bubble{
  position:absolute;
  bottom:calc(5% + 390px);
  left:50%;
  transform:translateX(-12%);
  background:rgba(255,255,255,.94);
  border:2px solid rgba(180,120,255,.55);
  border-radius:16px;
  padding:7px 16px;
  font-size:15px;color:#3a1860;
  white-space:nowrap;
  opacity:0;pointer-events:none;
  z-index:40;
  box-shadow:0 3px 20px rgba(150,80,255,.25), 0 0 40px rgba(120,60,200,.1);
  transition:opacity .2s, transform .2s;
  transform:translateX(-12%) scale(.92);
}
#bubble.show{
  opacity:1;
  transform:translateX(-12%) scale(1);
}
#bubble::after{
  content:'';position:absolute;bottom:-11px;left:24px;
  border:6px solid transparent;border-top-color:rgba(180,120,255,.55);
}

/* ── PARTICLES / ZZZ ─────────────────────────── */
#particles{position:absolute;inset:0;pointer-events:none;z-index:50;overflow:visible}

.zzz{
  position:absolute;font-style:italic;
  color:rgba(180,155,255,.92);font-family:Georgia,serif;
  text-shadow:0 0 10px rgba(180,155,255,.6);
  pointer-events:none;
  animation:floatZzz 3.2s ease-out forwards;
}
@keyframes floatZzz{
  0%  {transform:translateY(0) rotate(-10deg) scale(1);opacity:.9}
  100%{transform:translateY(-80px) rotate(18deg) scale(.55);opacity:0}
}

.sparkle{
  position:absolute;width:9px;height:9px;border-radius:50%;
  background:radial-gradient(circle,#fff 0%,#d8a8ff 55%,transparent 72%);
  pointer-events:none;
  animation:sparkAnim .8s ease-out forwards;
}
@keyframes sparkAnim{
  0%  {transform:scale(0) rotate(0);opacity:1}
  55% {transform:scale(1.7) rotate(200deg);opacity:1}
  100%{transform:scale(0) rotate(360deg);opacity:0}
}

.pop-p{
  position:absolute;width:9px;height:9px;border-radius:50%;
  background:#c06090;pointer-events:none;
  animation:popOut .55s ease-out forwards;
}
@keyframes popOut{
  0%  {transform:translate(0,0) scale(1);opacity:1}
  100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}
}

.float-e{
  position:absolute;pointer-events:none;font-size:20px;
  animation:floatE var(--dur,2.8s) ease-out forwards;
}
@keyframes floatE{
  0%  {transform:translateY(0) rotate(0) scale(1);opacity:1}
  100%{transform:translateY(var(--rise,-90px)) rotate(var(--spin,25deg)) scale(.65);opacity:0}
}

/* ── BUG ANIMATIONS ──────────────────────────── */
@keyframes bugWiggle{
  0%  {transform:translateX(-50%) rotate(0)}
  16% {transform:translateX(-50%) rotate(-9deg)}
  33% {transform:translateX(-50%) rotate(9deg)}
  50% {transform:translateX(-50%) rotate(-6deg)}
  66% {transform:translateX(-50%) rotate(6deg)}
  83% {transform:translateX(-50%) rotate(-2deg)}
  100%{transform:translateX(-50%) rotate(0)}
}
#bug-wrap.wiggling{animation:bugWiggle .7s ease-in-out}

/* flutter: rapid hue-shift + slight scale shimmer applied to img */
@keyframes flutterShim{
  0%  {filter:hue-rotate(0deg)   brightness(1.3) saturate(1.5);transform:scaleX(1)   }
  25% {filter:hue-rotate(90deg)  brightness(1.55) saturate(2);  transform:scaleX(1.06)}
  50% {filter:hue-rotate(180deg) brightness(1.4) saturate(1.8); transform:scaleX(.94) }
  75% {filter:hue-rotate(270deg) brightness(1.55) saturate(2);  transform:scaleX(1.06)}
  100%{filter:hue-rotate(360deg) brightness(1.3) saturate(1.5); transform:scaleX(1)   }
}
#bug-img.flutter{animation:flutterShim .13s linear infinite}

/* villain: grow to 3x */
@keyframes villainSwell{
  0%  {transform:scale(1)}
  60% {transform:scale(3.1)}
  100%{transform:scale(3)}
}
@keyframes villainShrink{
  from{transform:scale(3)}
  to  {transform:scale(1)}
}
#bug-wrap.v-in  #bug-img{
  animation:villainSwell .4s ease-out forwards;
}
#bug-wrap.v-out #bug-img{
  animation:villainShrink .6s ease-in-out forwards;
}

/* yawn */
@keyframes yawnAnim{
  0%  {transform:scale(1) translateY(0)}
  28% {transform:scale(1.07) translateY(-6px)}
  60% {transform:scale(1.03) translateY(-2px)}
  100%{transform:scale(1) translateY(0)}
}
#bug-img.yawning{animation:yawnAnim 1.3s ease-in-out}

/* lie-down sleep lean */
@keyframes lieDown{
  to{transform:rotate(80deg) translateX(-22%) scaleY(.82)}
}
@keyframes riseBack{
  from{transform:rotate(80deg) translateX(-22%) scaleY(.82)}
  to  {transform:rotate(0deg) translateX(0) scaleY(1)}
}
@keyframes sleepPuff{
  0%,100%{transform:rotate(80deg) translateX(-22%) scaleY(.82)}
  50%     {transform:rotate(80deg) translateX(-22%) scaleY(.88)}
}

#bug-img.lying  {animation:lieDown .9s ease-in-out forwards}
#bug-img.asleep {animation:sleepPuff 2.3s ease-in-out infinite}
#bug-img.waking {animation:riseBack .9s ease-in-out forwards}

/* stretch on wake */
@keyframes stretchAnim{
  0%  {transform:rotate(0) scaleX(.9) translateY(0)}
  35% {transform:rotate(-5deg) scaleX(1.1) translateY(-9px)}
  70% {transform:rotate(3deg) scaleX(1.04)}
  100%{transform:rotate(0) scaleX(1) translateY(0)}
}
#bug-img.stretch{animation:stretchAnim 1.1s ease-in-out}

/* twirl dance */
@keyframes twirl{
  from{transform:translateX(-50%) rotate(0deg)}
  to  {transform:translateX(-50%) rotate(360deg)}
}
#bug-wrap.twirl{animation:twirl .72s cubic-bezier(.4,0,.6,1)}

/* ── METERS ───────────────────────────────────── */
#meters{
  position:fixed;top:20px;right:20px;
  display:flex;flex-direction:column;gap:14px;
  z-index:100;
  /* glass pill */
  background:rgba(8,4,20,.55);
  border:1px solid rgba(160,100,255,.22);
  border-radius:14px;
  padding:14px 16px;
  backdrop-filter:blur(10px);
  box-shadow:0 0 24px rgba(80,30,160,.25);
}
.meter{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.m-label{font-size:11px;color:rgba(210,175,255,.75);letter-spacing:.6px;font-family:Georgia,serif}
.m-track{
  width:120px;height:8px;
  background:rgba(20,10,40,.7);
  border-radius:4px;
  border:1px solid rgba(120,70,200,.25);
  overflow:hidden;
}
.m-fill{height:100%;border-radius:4px;transition:width .65s ease}
#myFill   {background:linear-gradient(90deg,#9040e0,#d080ff)}
#sleepFill{background:linear-gradient(90deg,#3050d0,#7098ff)}

/* ── NOTE UI ──────────────────────────────────── */
#noteBtn{
  position:fixed;bottom:80px;right:24px;
  background:rgba(8,4,20,.62);
  border:1px solid rgba(160,100,255,.35);
  border-radius:22px;
  padding:9px 20px;
  font-size:13px;color:rgba(210,175,255,.88);
  cursor:pointer;font-family:Georgia,serif;
  backdrop-filter:blur(10px);
  box-shadow:0 0 18px rgba(100,40,200,.28);
  transition:transform .18s, box-shadow .18s;
  z-index:100;
}
#noteBtn:hover{transform:translateY(-2px);box-shadow:0 0 28px rgba(150,80,255,.45)}

#noteDisplay{
  position:fixed;bottom:126px;right:24px;
  background:rgba(8,4,20,.7);
  border:1px solid rgba(160,100,255,.3);
  border-radius:12px;
  padding:8px 16px;
  font-size:13px;color:rgba(210,175,255,.82);
  max-width:270px;text-align:right;
  display:none;
  backdrop-filter:blur(10px);
  box-shadow:0 0 16px rgba(80,30,160,.3);
  z-index:100;font-family:Georgia,serif;
  line-height:1.5;
}
#noteDisplay.show{display:block}

/* ── MODAL ────────────────────────────────────── */
#modal{
  display:none;position:fixed;inset:0;
  background:rgba(6,2,18,.65);
  backdrop-filter:blur(7px);
  z-index:200;align-items:center;justify-content:center;
}
#modal.open{display:flex}
.mbox{
  background:rgba(12,6,30,.92);
  border:1px solid rgba(180,110,255,.4);
  border-radius:22px;padding:28px;width:340px;
  box-shadow:0 0 50px rgba(100,40,200,.38);
}
.mbox h3{color:rgba(210,175,255,.92);margin-bottom:14px;font-size:16px;font-family:Georgia,serif}
.mbox textarea{
  width:100%;height:90px;
  background:rgba(8,4,22,.7);
  border:1px solid rgba(160,100,255,.35);
  border-radius:12px;padding:10px;
  font-family:Georgia,serif;font-size:13px;
  color:rgba(210,175,255,.9);resize:none;outline:none;
}
.mbox textarea::placeholder{color:rgba(160,120,255,.35)}
.mbox textarea:focus{border-color:rgba(200,130,255,.65)}
.mbtns{display:flex;gap:10px;margin-top:14px;justify-content:flex-end}
.mbtns button{
  padding:8px 20px;border-radius:16px;border:none;
  cursor:pointer;font-family:Georgia,serif;font-size:13px;
}
#bSave  {background:linear-gradient(135deg,#7030b0,#a050e0);color:#fff}
#bCancel{background:rgba(50,25,75,.7);color:rgba(190,150,255,.7)}

/* ── CRITTERS (sprite sheet) ─────────────────── */
/* mix-blend-mode:screen on #critters makes black pixels transparent against the dark forest */
.sprite-critter{
  position:absolute;
  width:72px;height:96px;
  background-image:url('critters.png');
  background-size:400% 200%;
  background-repeat:no-repeat;
  animation:spriteBob 2.1s ease-in-out infinite alternate;
}
@keyframes spriteBob{from{transform:translateY(0)}to{transform:translateY(-9px)}}

/* ── DEBUG ────────────────────────────────────── */
#debug-time{position:fixed;top:4px;left:8px;z-index:999;font-size:11px;color:rgba(255,255,255,.5);font-family:monospace;pointer-events:none}

/* ── STARS ────────────────────────────────────── */
/* Each star gets its own @keyframes injected by JS — no shared animation here */
#stars{position:absolute;inset:0;z-index:2;pointer-events:none;overflow:hidden}
.star{position:absolute;border-radius:50%;background:#fff}
/* 4-pointed sparkle stars — clip-path overrides border-radius */
.star-sparkle{
  clip-path:polygon(50% 0%,57% 43%,100% 50%,57% 57%,50% 100%,43% 57%,0% 50%,43% 43%);
  border-radius:0;
  background:#fff;
}

/* ── SLEEP BEDDING ───────────────────────────── */
/* Bug rotates 80deg CW around center-bottom when asleep.
   Head ends up ~264px right of center, ~45px above bug-wrap bottom.
   Pillow sits under the head; blanket drapes over the torso. */
#pillow{
  position:absolute;
  width:130px;
  bottom:calc(5% + 80px);
  left:calc(50% + 160px);
  z-index:9;
  pointer-events:none;
  transform:translateX(400px);
  transition:transform 1s cubic-bezier(.25,.46,.45,.94);
}
#pillow.show{transform:translateX(0)}

#blanket{
  position:absolute;
  width:220px;
  bottom:calc(5% + 70px);
  left:calc(50% - 115px);
  z-index:11;
  pointer-events:none;
  transform:translateY(400px);
  transition:transform 1.2s cubic-bezier(.25,.46,.45,.94);
}
#blanket.show{transform:translateY(0)}

/* ── DOCK BAR ────────────────────────────────── */
#dock{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  display:flex;gap:10px;align-items:center;
  background:rgba(8,4,20,.55);
  border:1px solid rgba(160,100,255,.22);
  border-radius:28px;
  padding:10px 18px 8px;
  backdrop-filter:blur(10px);
  box-shadow:0 0 24px rgba(80,30,160,.25);
  z-index:100;
}
.dock-btn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;cursor:pointer;padding:0;
  -webkit-tap-highlight-color:transparent;
}
.dock-icon{
  width:44px;height:44px;
  border-radius:50%;
  background:rgba(20,10,42,.6);
  border:1px solid rgba(160,100,255,.28);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;
  transition:transform .15s, background .15s, box-shadow .15s;
}
.dock-btn:hover .dock-icon{
  transform:translateY(-3px) scale(1.08);
  background:rgba(40,18,72,.7);
  box-shadow:0 0 14px rgba(160,100,255,.4);
}
.dock-btn:active .dock-icon{
  transform:scale(.92);
}
.dock-icon-img{padding:4px;overflow:hidden}
.dock-img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.dock-lbl{
  font-size:9px;
  color:rgba(210,175,255,.65);
  font-family:Georgia,serif;
  letter-spacing:.3px;
  white-space:nowrap;
}

/* dance: side-to-side bounce */
@keyframes bugDance{
  0%  {transform:translateX(-50%) rotate(0) translateY(0)}
  12% {transform:translateX(-50%) rotate(-12deg) translateY(-8px)}
  25% {transform:translateX(-50%) rotate(10deg) translateY(0)}
  37% {transform:translateX(-50%) rotate(-8deg) translateY(-6px)}
  50% {transform:translateX(-50%) rotate(12deg) translateY(0)}
  62% {transform:translateX(-50%) rotate(-10deg) translateY(-8px)}
  75% {transform:translateX(-50%) rotate(6deg) translateY(0)}
  87% {transform:translateX(-50%) rotate(-4deg) translateY(-4px)}
  100%{transform:translateX(-50%) rotate(0) translateY(0)}
}
#bug-wrap.dancing{animation:bugDance 1.2s ease-in-out}
</style>
</head>
<body>
<div id="scene">

  <!-- Forest backgrounds (crossfade pair) -->
  <div id="forest-base"></div>
  <div id="forest-next"></div>
  <div id="vignette"></div>

  <!-- Fog layers (above forest, below stars/critters/bug) -->
  <div id="fog">
    <div class="fog-layer fog-1"></div>
    <div class="fog-layer fog-2"></div>
    <div class="fog-layer fog-3"></div>
    <div class="fog-layer fog-4"></div>
  </div>

  <!-- Stars (twinkling, above forest) -->
  <div id="stars"></div>

<!-- Critters layer -->
  <div id="critters"></div>

  <!-- Birds flock layer (above fog+critters, below bug) -->
  <div id="birds"></div>

  <!-- Spore clouds (above fog/stars, below critters/bug) -->
  <div id="spores"></div>

  <!-- Particles -->
  <div id="particles"></div>

  <!-- Sleep bedding -->
  <img id="pillow" src="pillow.png" alt="">
  <img id="blanket" src="blanket.png" alt="">

  <!-- Bug -->
  <div id="bug-wrap">
    <img id="bug-img" src="bug.png" alt="Bug">

  </div>

  <!-- Fancy overlay: hat + mustache + monocle (full-scene png) -->
  <img id="fancy" src="fancy.png" alt="">

  <!-- Speech bubble -->
  <div id="bubble"></div>

  <!-- Meters -->
  <div id="meters">
    <div class="meter">
      <span class="m-label">miss you 💕</span>
      <div class="m-track"><div class="m-fill" id="myFill" style="width:100%"></div></div>
    </div>
    <div class="meter">
      <span class="m-label">sleepy 🌙</span>
      <div class="m-track"><div class="m-fill" id="sleepFill" style="width:0%"></div></div>
    </div>
  </div>

  <!-- Note -->
  <div id="noteDisplay"></div>
  <button id="noteBtn">leave a note 🍪</button>

  <!-- Dock bar -->
  <div id="dock">
    <button class="dock-btn" id="dFeed"><div class="dock-icon">🍪</div><span class="dock-lbl">Feed</span></button>
    <button class="dock-btn" id="dRug"><div class="dock-icon dock-icon-img"><img src="rug.png" alt="Rug" class="dock-img"></div><span class="dock-lbl">Rug</span></button>
    <button class="dock-btn" id="dDress"><div class="dock-icon">🎩</div><span class="dock-lbl">Dress Up</span></button>
    <button class="dock-btn" id="dSing"><div class="dock-icon">🎵</div><span class="dock-lbl">Sing</span></button>
    <button class="dock-btn" id="dSleep"><div class="dock-icon">🌙</div><span class="dock-lbl">Sleep</span></button>
    <button class="dock-btn" id="dGift"><div class="dock-icon">🎁</div><span class="dock-lbl">Gift</span></button>
  </div>

</div><!-- /scene -->

<!-- Debug time display -->
<div id="debug-time"></div>

<!-- Modal -->
<div id="modal">
  <div class="mbox">
    <h3>leave a note for Bug ✨</h3>
    <textarea id="noteText" placeholder="say something sweet..."></textarea>
    <div class="mbtns">
      <button id="bCancel">cancel</button>
      <button id="bSave">send 💕</button>
    </div>
  </div>
</div>

<script>
'use strict';
// ═══════════════════════════════════════════════
//  ELEMENTS
// ═══════════════════════════════════════════════
const $scene      = document.getElementById('scene');
const $forestBase = document.getElementById('forest-base');
const $forestNext = document.getElementById('forest-next');
const $bugW   = document.getElementById('bug-wrap');
const $bugI   = document.getElementById('bug-img');
const $pillow = document.getElementById('pillow');
const $blanketEl = document.getElementById('blanket');
const $bubble = document.getElementById('bubble');
const $fancy  = document.getElementById('fancy');
const $parts  = document.getElementById('particles');
const $criL   = document.getElementById('critters');
const $birds  = document.getElementById('birds');
const $spores = document.getElementById('spores');
const $myFill = document.getElementById('myFill');
const $slFill = document.getElementById('sleepFill');
const $noteD  = document.getElementById('noteDisplay');
const $noteB  = document.getElementById('noteBtn');
const $modal  = document.getElementById('modal');
const $noteT  = document.getElementById('noteText');
const $bSave  = document.getElementById('bSave');
const $bCan   = document.getElementById('bCancel');

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
const S = {
  sleeping:   false,
  villain:    false,
  hasMust:    false,
  busy:       false,
  fluttering: false,
  twirling:   false,
  eyePoke:    false,
  feeding:    false,    // true during cookie eating sequence
  gifting:    false,    // true during 3s wishfulbug.png display
  singing:    false,    // true during 3s popstarbug.png display
  dressing:   false,    // true during 3s fancybug.png display
  rugMode:    false,    // true during 3s bugrug.png display
  kissing:    false,    // true during 1s kisscat.png display
  kissTm:     null,
  worried:    false,    // true when MY < 50 and showing worriedbug.png
  stayAwake:  false,    // true during the 1-min forced-awake window after a poke-wake
  zzzInt:     null,
  peekTm:     null,
  napTm:      null,
  stayAwakeTm:null,
  bubbleTm:   null,
  imgAnims:   new Set(), // track classes on #bug-img
};

// ═══════════════════════════════════════════════
//  MISS-YOU PERSISTENCE
// ═══════════════════════════════════════════════
function loadMY() {
  const base = parseFloat(localStorage.getItem('myBase') ?? '100');
  const ts   = parseFloat(localStorage.getItem('myTs')   ?? Date.now());
  // drains fully in ~15 real-world minutes of absence
  return Math.max(0, base - ((Date.now() - ts) / 1000 / 900) * 100);
}
function saveMY(v) {
  const base = v.toFixed(2);
  const ts = Date.now();
  localStorage.setItem('myBase', base);
  localStorage.setItem('myTs',   ts);
  fetch('/api/state', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ myBase: parseFloat(base), myTs: ts })
  }).catch(() => {});
}
let MY = loadMY();
saveMY(MY);

// Try loading state from server (overrides localStorage if fresher)
fetch('/api/state').then(r => r.json()).then(d => {
  if (d.myTs && d.myTs > parseFloat(localStorage.getItem('myTs') || '0')) {
    localStorage.setItem('myBase', d.myBase);
    localStorage.setItem('myTs',   d.myTs);
    MY = loadMY();
  }
}).catch(() => {});

// ═══════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════
function say(txt, ms = 3400) {
  $bubble.textContent = txt;
  $bubble.classList.add('show');
  clearTimeout(S.bubbleTm);
  S.bubbleTm = setTimeout(() => $bubble.classList.remove('show'), ms);
}

function sceneXY(el) {
  const sr = $scene.getBoundingClientRect();
  const er = el.getBoundingClientRect();
  return { x: er.left - sr.left + er.width/2, y: er.top - sr.top + er.height/2 };
}

function sparkles(el, n = 8) {
  const {x, y} = sceneXY(el);
  for (let i = 0; i < n; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    const a = (i/n)*360, d = 24 + Math.random()*34;
    s.style.left = (x + Math.cos(a*Math.PI/180)*d) + 'px';
    s.style.top  = (y + Math.sin(a*Math.PI/180)*d) + 'px';
    $parts.appendChild(s);
    setTimeout(() => s.remove(), 900);
  }
}

function floatEmoji(emoji, n = 5, near = $bugW) {
  const {x, y} = sceneXY(near);
  for (let i = 0; i < n; i++) {
    setTimeout(() => {
      const d = document.createElement('div');
      d.className = 'float-e';
      d.textContent = emoji;
      d.style.left = (x - 55 + Math.random()*110) + 'px';
      d.style.top  = (y + 10) + 'px';
      d.style.setProperty('--rise', (-75 - Math.random()*60) + 'px');
      d.style.setProperty('--spin', (-35 + Math.random()*70) + 'deg');
      d.style.setProperty('--dur',  (2.4 + Math.random()*.8) + 's');
      $parts.appendChild(d);
      setTimeout(() => d.remove(), 3400);
    }, i * 360);
  }
}

function popParticles(el) {
  const {x, y} = sceneXY(el);
  for (let i = 0; i < 10; i++) {
    const p = document.createElement('div');
    p.className = 'pop-p';
    const a = (i/10)*360, d = 28 + Math.random()*24;
    p.style.left = x + 'px'; p.style.top = y + 'px';
    p.style.setProperty('--dx', Math.cos(a*Math.PI/180)*d + 'px');
    p.style.setProperty('--dy', Math.sin(a*Math.PI/180)*d + 'px');
    $parts.appendChild(p);
    setTimeout(() => p.remove(), 650);
  }
}

function floatHearts() {
  const glyphs = ['❤️','🩷','💗','💖','💕','❤️','🩷'];
  const n = 5 + Math.floor(Math.random() * 3); // 5–7
  const {x, y} = sceneXY($bugW);
  for (let i = 0; i < n; i++) {
    setTimeout(() => {
      const d = document.createElement('div');
      d.className = 'float-e';
      d.textContent = glyphs[Math.floor(Math.random() * glyphs.length)];
      d.style.fontSize = (13 + Math.random() * 11) + 'px';
      d.style.left = (x - 65 + Math.random() * 130) + 'px';
      d.style.top  = (y - 20) + 'px';
      d.style.setProperty('--rise', (-80 - Math.random() * 80) + 'px');
      d.style.setProperty('--spin', (-25 + Math.random() * 50) + 'deg');
      d.style.setProperty('--dur',  (1.6 + Math.random() * 1.2) + 's');
      $parts.appendChild(d);
      setTimeout(() => d.remove(), 3200);
    }, i * 130);
  }
}

function spawnZzz() {
  const d = document.createElement('div');
  d.className = 'zzz';
  d.textContent = ['z','zz','zzz'][Math.floor(Math.random()*3)];
  d.style.fontSize = (12 + Math.random()*13) + 'px';
  const {x, y} = sceneXY($bugW);
  d.style.left = (x + 5 + Math.random()*22) + 'px';
  d.style.top  = (y - 20) + 'px';
  $parts.appendChild(d);
  setTimeout(() => d.remove(), 3400);
}

// Image animation class manager — prevents conflicts
function imgClass(add, remove = []) {
  if (!Array.isArray(remove)) remove = [remove];
  remove.forEach(c => $bugI.classList.remove(c));
  void $bugI.offsetWidth; // reflow
  if (add) $bugI.classList.add(add);
}

function onInteract() {
  MY = Math.min(100, MY + 20);
  saveMY(MY);
  syncBase();
}

// ═══════════════════════════════════════════════
//  WIGGLE
// ═══════════════════════════════════════════════
function wiggle() {
  $bugW.classList.remove('wiggling');
  void $bugW.offsetWidth;
  $bugW.classList.add('wiggling');
  setTimeout(() => $bugW.classList.remove('wiggling'), 750);
}

// ═══════════════════════════════════════════════
//  HIT ZONES — precise click detection via getBoundingClientRect
// ═══════════════════════════════════════════════
// All values are fractions of the bug image (0..1, top-left origin).
// Checked in priority order — specific zones first, body last.
const HIT_ZONES = [
  { id:'eyeLeft',   t:0.13, b:0.33, l:0.16, r:0.36, color:'rgba(255,80,80,.45)',   label:'eye L'  },
  { id:'eyeRight',  t:0.13, b:0.33, l:0.47, r:0.67, color:'rgba(255,80,80,.45)',   label:'eye R'  },
  { id:'mouth',     t:0.48, b:0.58, l:0.42, r:0.58, color:'rgba(255,210,50,.55)',  label:'mouth'  },
  { id:'wingLeft',  t:0.35, b:0.65, l:0.00, r:0.25, color:'rgba(80,200,255,.45)',  label:'wing L' },
  { id:'wingRight', t:0.35, b:0.65, l:0.75, r:1.00, color:'rgba(80,200,255,.45)',  label:'wing R' },
  { id:'body',      t:0.30, b:0.85, l:0.20, r:0.80, color:'rgba(100,255,150,.35)', label:'body'   },
];

function inZone(z, px, py) {
  return px >= z.l && px <= z.r && py >= z.t && py <= z.b;
}

// Preload alternate images so swaps are instant
(function(){
  ['lefteye.png','righteye.png','asleep.png','kisscat.png','worriedbug.png','bugrug.png','eatingcookies.png','cookiesgone.png','fancybug.png','popstarbug.png','ragebug.png','wishfulbug.png','pillow.png','blanket.png']
    .forEach(s => { new Image().src = s; });
})();

// Returns the correct resting image based on Miss You level
function baseImg() {
  return (MY < 50) ? 'worriedbug.png' : 'bug.png';
}

// Swaps to the correct base image when no temp state is active;
// tracks S.worried so swaps only happen when the threshold actually changes.
function syncBase() {
  if (S.sleeping || S.eyePoke || S.kissing || S.rugMode || S.feeding || S.dressing || S.singing || S.gifting || S.busy) return;
  const want = baseImg();
  if (!S.worried && want === 'worriedbug.png') {
    S.worried = true;
    $bugI.src = 'worriedbug.png';
  } else if (S.worried && want === 'bug.png') {
    S.worried = false;
    $bugI.src = 'bug.png';
  }
}

function pokeEye(altSrc) {
  if (S.eyePoke) return;
  S.eyePoke = true;
  $bugI.src = altSrc;
  say('Ow! 🌟', 2000);
  setTimeout(() => { S.eyePoke = false; $bugI.src = baseImg(); }, 1500);
}

// ── Unified click handler ──────────────────────
$bugW.addEventListener('click', e => {
  e.stopPropagation();

  // Any click wakes Bug from sleep
  if (S.sleeping) { wakeUp(); return; }

  // Map click to fraction of the rendered bug image
  const r  = $bugI.getBoundingClientRect();
  const px = (e.clientX - r.left) / r.width;
  const py = (e.clientY - r.top)  / r.height;

  // Find first matching zone in priority order
  const zone = HIT_ZONES.find(z => inZone(z, px, py));

  switch (zone?.id) {
    case 'eyeLeft':
      onInteract();
      pokeEye('lefteye.png');
      break;

    case 'eyeRight':
      onInteract();
      pokeEye('righteye.png');
      break;

    case 'mouth':
      if (S.hasMust) break;
      onInteract();
      S.hasMust = true;
      $fancy.classList.remove('popping');
      $fancy.classList.add('show');
      say('🎩 very distinguished!!');
      setTimeout(() => {
        S.hasMust = false;
        $fancy.classList.remove('show');
        $fancy.classList.add('popping');
        popParticles($fancy);
        say('pop! ✨', 2200);
        setTimeout(() => $fancy.classList.remove('popping'), 500);
      }, 5000);
      break;

    case 'wingLeft':
    case 'wingRight':
      if (S.fluttering) break;
      onInteract();
      S.fluttering = true;
      $bugI.classList.add('flutter');
      setTimeout(() => { $bugI.classList.remove('flutter'); S.fluttering = false; }, 1700);
      break;

    case 'body':
    default:
      onInteract();
      wiggle();
      sparkles($bugW);
      floatHearts();
      say('beep beep 🐛');
      if (!S.kissing) {
        S.kissing = true;
        $bugI.src = 'kisscat.png';
        $bugI.style.mixBlendMode = 'screen';
        S.kissTm = setTimeout(() => {
          S.kissTm = null; S.kissing = false;
          $bugI.style.mixBlendMode = '';
          $bugI.src = baseImg();
        }, 1000);
      }
      break;
  }
});


// ═══════════════════════════════════════════════
//  HOVER — lean + occasional twirl
// ═══════════════════════════════════════════════
let lastMove = 0;
$scene.addEventListener('mousemove', e => {
  if (S.sleeping || S.villain || S.twirling) return;
  const sr = $scene.getBoundingClientRect();
  const dx = e.clientX - (sr.left + sr.width/2);
  const lean = Math.max(-11, Math.min(11, dx/26));
  $bugW.style.transform = `translateX(-50%) rotate(${lean}deg)`;

  // random twirl chance — low probability per mouse move, cooldown 8s
  const now = Date.now();
  if (now - lastMove > 8000 && Math.random() < 0.008) {
    lastMove = now;
    S.twirling = true;
    $bugW.classList.add('twirl');
    setTimeout(() => {
      $bugW.classList.remove('twirl');
      S.twirling = false;
    }, 750);
  }
});
$scene.addEventListener('mouseleave', () => {
  if (!S.sleeping) $bugW.style.transform = 'translateX(-50%)';
});

// ═══════════════════════════════════════════════
//  SLEEP / WAKE
// ═══════════════════════════════════════════════
function fallAsleep(autoWakeSecs = 0) {
  if (S.sleeping) return;
  S.sleeping = true;
  S.busy = true;
  // Clear any temp image states and return to base image before sleep
  if (S.kissing)  { clearTimeout(S.kissTm); S.kissTm = null; S.kissing = false; $bugI.style.mixBlendMode = ''; }
  if (S.eyePoke)  { S.eyePoke = false; }
  $bugI.src = baseImg();
  $bubble.classList.remove('show');

  // 1. Yawn
  imgClass('yawning', []);
  say('*yaaaawn* 😪', 2200);

  setTimeout(() => {
    $bugI.classList.remove('yawning');

    // 2. Lie down
    imgClass('lying', ['stretch']);
    setTimeout(() => {
      // 3. Sleeping state (puff breathing) — swap to sleeping image
      $bugI.classList.remove('lying');
      $bugI.src = 'asleep.png';
      $bugI.classList.add('asleep');

      // 3b. Slide in pillow + blanket
      $pillow.classList.add('show');
      $blanketEl.classList.add('show');

      // 4. ZZZs
      S.zzzInt = setInterval(spawnZzz, 1900);

      // 5. Suspicious peek loop
      schedulePeek();

      // Auto-wake for nap
      if (autoWakeSecs > 0) {
        S.napTm = setTimeout(() => wakeUp(false), autoWakeSecs * 1000);
      }
    }, 950);
  }, 1400);
}

function wakeUp(fromInteract = true) {
  if (!S.sleeping) return Promise.resolve();
  S.sleeping = false;
  S.busy = true;

  clearInterval(S.zzzInt);
  clearTimeout(S.peekTm);
  clearTimeout(S.napTm);
  clearTimeout(S.stayAwakeTm);
  S.stayAwakeTm = null;
  S.stayAwake = false;

  // Slide out bedding
  $pillow.classList.remove('show');
  $blanketEl.classList.remove('show');

  // Swap back to base image before rise animation
  $bugI.src = baseImg();

  // Rise + stretch — returns a promise that resolves when done
  $bugI.classList.remove('asleep','lying');
  imgClass('waking', []);
  const done = new Promise(resolve => {
    setTimeout(() => {
      $bugI.classList.remove('waking');
      imgClass('stretch', []);
      setTimeout(() => {
        $bugI.classList.remove('stretch');
        S.busy = false;
        resolve();
      }, 1200);
    }, 950);
  });

  if (fromInteract) {
    // Poke-wake: boost Miss You, stay awake for 1 minute
    onInteract();
    say('mmph... 😴 oh! hi!!');
    S.stayAwake = true;
    S.stayAwakeTm = setTimeout(() => {
      S.stayAwake = false;
      S.stayAwakeTm = null;
      // After 1 min, go back to sleep if it's still nighttime
      if (sleepiness() >= 95 && !S.sleeping && !S.busy) {
        fallAsleep(0);
      }
    }, 60000);
  } else {
    // Natural wake (8am alarm or nap timeout): say good morning
    say('*stretch* ✨ good morning', 3000);
  }
  return done;
}

function schedulePeek() {
  const delay = 8000 + Math.random() * 7000;
  S.peekTm = setTimeout(() => {
    if (!S.sleeping) return;
    say('...👀', 1600);
    // subtle tilt to imply peeking eye
    $bugW.style.transform = 'translateX(-50%) rotate(-4deg)';
    setTimeout(() => {
      if (!S.sleeping) return;
      $bugW.style.transform = 'translateX(-50%) rotate(4deg)';
      setTimeout(() => {
        if (!S.sleeping) return;
        $bugW.style.transform = 'translateX(-50%) rotate(0deg)';
        schedulePeek();
      }, 700);
    }, 700);
  }, delay);
}

// ═══════════════════════════════════════════════
//  VILLAIN MODE
// ═══════════════════════════════════════════════
function villainMode() {
  if (S.busy || S.sleeping) return;
  S.busy = true; S.villain = true;
  $bugI.src = 'ragebug.png';
  $bugW.classList.add('v-in');
  say('muahahaha 😈', 1200);
  setTimeout(() => {
    $bugW.classList.remove('v-in');
    $bugW.classList.add('v-out');
    $bugI.src = baseImg();
    say('...ahem. nevermind. 😇', 2500);
    setTimeout(() => {
      $bugW.classList.remove('v-out');
      S.villain = false; S.busy = false;
    }, 700);
  }, 1000);
}

// ═══════════════════════════════════════════════
//  RANDOM EVENTS
// ═══════════════════════════════════════════════
function scheduleRandom() {
  setTimeout(() => {
    if (!S.busy && !S.sleeping && !S.stayAwake) {
      if (Math.random() < .67) villainMode();
      else fallAsleep(10 + Math.random() * 5); // nap 10–15s
    }
    scheduleRandom();
  }, 45000 + Math.random() * 45000);
}

// ═══════════════════════════════════════════════
//  METERS
// ═══════════════════════════════════════════════
function estHour() {
  const h = parseInt(
    new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',hour:'numeric',hour12:false})
      .formatToParts(new Date()).find(p=>p.type==='hour').value, 10);
  return h === 24 ? 0 : h; // midnight guard
}

function sleepiness() {
  const h = estHour();
  if (h >= 22) return Math.min(100, (h - 22) * 35 + 8);
  if (h <   8) return Math.min(100, (8  -  h) * 13 + 4);
  return 0;
}

let sadTimer = null;
function updateMeters() {
  MY = loadMY();
  $myFill.style.width = MY + '%';

  // sad mode
  if (MY <= 3 && !S.sleeping) {
    $bugW.classList.add('sad');
    if (!sadTimer) {
      sadTimer = setInterval(() => {
        if (MY > 3) { clearInterval(sadTimer); sadTimer = null; return; }
        say('where is Mr. Cookie? 🍪', 4200);
        floatEmoji('🍪', 6);
      }, 8000);
      say('where is Mr. Cookie? 🍪', 4200);
      floatEmoji('🍪', 6);
    }
  } else {
    $bugW.classList.remove('sad');
    if (sadTimer) { clearInterval(sadTimer); sadTimer = null; }
  }

  // sleepy meter
  const sl = sleepiness();
  $slFill.style.width = sl + '%';

  // random yawn when drowsy (skip during stay-awake window)
  if (sl > 45 && !S.sleeping && !S.busy && !S.stayAwake && Math.random() < .04) {

  if (sl >= 95 && !S.sleeping && !S.busy && !S.stayAwake) {
    fallAsleep(0); // no auto-wake — stays until 8am
  }

  // sync worried face image when Miss You crosses the 50% threshold
  syncBase();

  // check for time-of-day period change
  checkPeriod();

  // debug: show NY time + period in top-left
  const $dbg = document.getElementById('debug-time');
  if ($dbg) $dbg.textContent = `NY ${estHour()}h · ${timePeriod()}`;
}

const BG_IMAGES = {
  night: 'forest.png',
  dawn:  'dawnforest.png',
  day:   'dayforest.png',
  dusk:  'duskforest.png',
};

let currentPeriod = null;

function timePeriod() {
  const h = estHour();
  if (h >= 22 || h < 5)  return 'night';
  if (h >= 5  && h < 8)  return 'dawn';
  if (h >= 8  && h < 18) return 'day';
  return 'dusk'; // 18–21
}

function applyPeriod(period, instant) {
  if (period === currentPeriod) return;
  currentPeriod = period;

  // — Background crossfade —
  const url = "url('" + BG_IMAGES[period] + "')";
  if (instant) {
    $forestBase.style.backgroundImage = url;
  } else {
    $forestNext.style.backgroundImage = url;
    $forestNext.style.opacity = '1';
    setTimeout(() => {
      $forestBase.style.backgroundImage = url;
      $forestNext.style.transition = 'none';
      $forestNext.style.opacity = '0';
      setTimeout(() => { $forestNext.style.transition = 'opacity 3s ease'; }, 50);
    }, 3100);
  }

  // — Scene class for fog tint / star visibility —
  $scene.classList.remove('period-night','period-dawn','period-day','period-dusk');
  $scene.classList.add('period-' + period);
}

function checkPeriod() { applyPeriod(timePeriod()); }

  { topMin:0,  topMax:25,  scale:0.30, opMin:0.30, opMax:0.50, blur:3.0, speedMin:40000, speedMax:60000, spawnMin:12000, spawnMax:22000, z:1 },
  { topMin:25, topMax:50,  scale:0.50, opMin:0.50, opMax:0.70, blur:1.5, speedMin:28000, speedMax:45000, spawnMin:10000, spawnMax:18000, z:2 },

function spawnCritter(band) {
  const critter = makeSpriteCritter();

  const goRight = Math.random() < 0.5;
  const startX  = goRight ? -120 : window.innerWidth + 80;
  const endX    = goRight ? window.innerWidth + 120 : -120;
  const dur     = band.speedMin + Math.random() * (band.speedMax - band.speedMin);
  const topPct  = band.topMin + Math.random() * (band.topMax - band.topMin);
  const opacity = band.opMin  + Math.random() * (band.opMax  - band.opMin);
  const scaleX  = goRight ? band.scale : -band.scale;

  // Wrapper handles movement, depth scale, opacity, blur
  // Inner critter keeps its own bob/float animation (no transform conflict)
  const scaleStr = `scale(${scaleX.toFixed(3)},${band.scale.toFixed(3)})`;
  const wrapper = document.createElement('div');
  let ws = `position:absolute;top:${topPct.toFixed(2)}%;left:0;` +
    `transform:translateX(${startX}px) ${scaleStr};` +
    `opacity:${opacity.toFixed(3)};z-index:${band.z};` +
    `transition:transform ${Math.round(dur)}ms linear;` +
    `pointer-events:none;will-change:transform;backface-visibility:hidden;`;
  if (band.blur > 0) ws += `filter:blur(${band.blur}px);`;
  wrapper.style.cssText = ws;

  wrapper.appendChild(critter);
  $criL.appendChild(wrapper);
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      wrapper.style.transform = `translateX(${endX}px) ${scaleStr}`;

  setTimeout(() => wrapper.remove(), dur + 800);
}

function scheduleDepthBand(band) {
  const delay = band.spawnMin + Math.random() * (band.spawnMax - band.spawnMin);
  setTimeout(() => { spawnCritter(band); scheduleDepthBand(band); }, delay);
}

// ═══════════════════════════════════════════════
//  STAR FIELD — 400 stars with depth layers + sparkle stars
// ═══════════════════════════════════════════════
(function buildStarfield() {
  const N_SPARKLE = 7;   // 4-pointed sparkle stars (indices 0..6)
  const N_FEATURE = 13;  // large glowing circles   (indices 7..19)
  const TOTAL     = 400; // remaining are regular    (indices 20..399)

  const layer = document.getElementById('stars');
  let css = '';

  // ── Deep sky palettes (top 60% of screen) ─────
  // Cool whites, ice blues, faint lilac — distant starlight
  const SKY_PAL = [
    ['#ddeeff', '#ffffff', '#ddeeff'],  // barely-cool white
    ['#b8d0ff', '#ffffff', '#b8d0ff'],  // ice blue ↔ white
    ['#d8c8ff', '#f2eeff', '#c8deff'],  // lilac → lavender → ice
    ['#ffffff', '#f8fdff', '#ffffff'],  // pure white with cool hint
    ['#c8eaff', '#ffffff', '#d8eeff'],  // cool cross-fade
  ];

  // ── Forest palettes (bottom 40% of screen) ────
  // Aqua / pale cyan to echo the bioluminescent teal of the trees
  const FOREST_PAL = [
    ['#a8f0e8', '#d0fff8', '#a8f0e8'],  // aqua ↔ pale cyan
    ['#82e8d8', '#c5f5f0', '#92eee0'],  // teal ↔ pale aqua
    ['#b2f0eb', '#e2fffc', '#b2f0eb'],  // pale cyan ↔ white-aqua
    ['#9aeae0', '#cef8f2', '#b0f0eb'],  // medium aqua cross-fade
  ];

  for (let i = 0; i < TOTAL; i++) {
    const isSparkle = i < N_SPARKLE;
    const isFeature = !isSparkle && i < N_SPARKLE + N_FEATURE;
    const isRegular = !isSparkle && !isFeature;

    // ── Zone assignment ──────────────────────────
    // Regular stars: ~60 % go to sky zone, ~40 % to forest zone
    const inForest = isRegular && (Math.random() < 0.40);

    // ── Vertical position ────────────────────────
    let topPct;
    if      (isSparkle) topPct = 2  + Math.random() * 53;  // sky only
    else if (isFeature) topPct = 1  + Math.random() * 58;  // mostly sky
    else if (inForest)  topPct = 60 + Math.random() * 39;  // forest zone
    else                topPct =      Math.random() * 60;  // sky zone

    // ── Size ─────────────────────────────────────
    let size;
    if      (isSparkle) size = 14  + Math.random() * 8;    // 14–22 px bounding box
    else if (isFeature) size = 3.8 + Math.random() * 2.4;  // 3.8–6.2 px
    else                size = 0.6 + Math.random() * 2.2;  // 0.6–2.8 px

    // ── Timing ───────────────────────────────────
    // Every star gets a different duration AND delay — the twin guarantors of asyncness.
    // Forest stars run slower and their peak sits deeper in the cycle.
    let dur, del, peak;
    if (isSparkle) {
      dur  = (3.0 + Math.random() * 3.0).toFixed(3);  // 3–6 s — slow, regal
      del  = (Math.random() * 12).toFixed(3);          // wide phase spread
      peak = (35  + Math.random() * 20).toFixed(1);   // peak at 35–55 %
    } else if (inForest) {
      dur  = (2.5 + Math.random() * 2.5).toFixed(3);  // 2.5–5 s — slower
      del  = (Math.random() * 10).toFixed(3);
      peak = (30  + Math.random() * 35).toFixed(1);   // broad, lazy peak
    } else {
      dur  = (1.5 + Math.random() * 2.5).toFixed(3);  // 1.5–4 s
      del  = (Math.random() * 9).toFixed(3);
      peak = (22  + Math.random() * 32).toFixed(1);   // peak at 22–54 %
    }

    // ── Brightness ───────────────────────────────
    let opLo, opHi, sc;
    if (isSparkle) {
      opLo = (0.20 + Math.random() * 0.15).toFixed(3);
      opHi = (0.88 + Math.random() * 0.12).toFixed(3);
      sc   = (1.18 + Math.random() * 0.28).toFixed(3);
    } else if (isFeature) {
      opLo = (0.06 + Math.random() * 0.14).toFixed(3);
      opHi = (0.85 + Math.random() * 0.15).toFixed(3);
      sc   = (1.10 + Math.random() * 0.65).toFixed(3);
    } else if (inForest) {
      // softer — reflected bioluminescent light, not distant stars
      opLo = (0.08 + Math.random() * 0.12).toFixed(3);
      opHi = (0.32 + Math.random() * 0.28).toFixed(3);  // 0.32–0.60 max
      sc   = (1.03 + Math.random() * 0.18).toFixed(3);  // barely grows
    } else {
      opLo = (0.06 + Math.random() * 0.16).toFixed(3);
      opHi = (0.55 + Math.random() * 0.40).toFixed(3);
      sc   = (1.08 + Math.random() * 0.30).toFixed(3);
    }

    // ── Colour palette ───────────────────────────
    let pal;
    if      (isSparkle) pal = ['#fffef0', '#ffffff', '#fffef0'];
    else if (inForest)  pal = FOREST_PAL[Math.floor(Math.random() * FOREST_PAL.length)];
    else                pal = SKY_PAL   [Math.floor(Math.random() * SKY_PAL.length)];

    // ── Keyframe ─────────────────────────────────
    if (isSparkle) {
      // Sparkle rotates 45° over the full cycle (4-fold symmetry = invisible seam),
      // and uses filter:drop-shadow so the glow hugs the star shape.
      const glowLo = `drop-shadow(0 0 ${(size*0.45).toFixed(1)}px rgba(255,255,230,.45))`;
      const glowHi = `drop-shadow(0 0 ${(size*1.1).toFixed(1)}px rgba(255,255,245,.95))`
                   + ` drop-shadow(0 0 ${(size*2.8).toFixed(1)}px rgba(200,235,255,.38))`;
      css += `@keyframes tw${i}{`
           +   `0%{opacity:${opLo};transform:scale(1) rotate(0deg);filter:${glowLo}}`
           +   `${peak}%{opacity:${opHi};transform:scale(${sc}) rotate(22.5deg);filter:${glowHi}}`
           +   `100%{opacity:${opLo};transform:scale(1) rotate(45deg);filter:${glowLo}}`
           + `}`;
    } else {
      // Circles: opacity + scale + background colour shift
      css += `@keyframes tw${i}{`
           +   `0%{opacity:${opLo};transform:scale(1);background:${pal[0]}}`
           +   `${peak}%{opacity:${opHi};transform:scale(${sc});background:${pal[1]}}`
           +   `100%{opacity:${opLo};transform:scale(1);background:${pal[2]}}`
           + `}`;
    }

    // ── Box-shadow / glow ────────────────────────
    // Sparkle stars get their glow from filter:drop-shadow (animated above).
    let glow = '';
    if (isFeature) {
      glow = `0 0 ${(size*2.8).toFixed(1)}px rgba(210,232,255,.90),`
           + `0 0 ${(size*6.5).toFixed(1)}px rgba(160,202,255,.28)`;
    } else if (inForest) {
      glow = `0 0 ${(size*2.2).toFixed(1)}px rgba(168,240,232,${
               (parseFloat(opHi)*0.42).toFixed(2)})`;
    } else if (!isSparkle) {
      glow = `0 0 ${(size*1.6).toFixed(1)}px rgba(255,255,255,${
               (parseFloat(opHi)*0.48).toFixed(2)})`;
    }

    // ── Build element ────────────────────────────
    const s = document.createElement('div');
    s.className = isSparkle ? 'star star-sparkle' : 'star';

    let style =
        `left:${(Math.random() * 100).toFixed(2)}%;`
      + `top:${topPct.toFixed(2)}%;`
      + `width:${size.toFixed(1)}px;`
      + `height:${size.toFixed(1)}px;`
      + `animation:tw${i} ${dur}s ease-in-out ${del}s infinite;`;

    if (glow)        style += `box-shadow:${glow};`;
    if (isFeature)   style += `filter:blur(${(0.3 + Math.random()*0.5).toFixed(1)}px);`;

    s.style.cssText = style;
    layer.appendChild(s);
  }

  // Inject all 400 keyframes in one DOM write
  const tag = document.createElement('style');
  tag.textContent = css;
  document.head.appendChild(tag);
})();

// ═══════════════════════════════════════════════
//  SPORE CLOUDS
// ═══════════════════════════════════════════════
// Estimated mushroom positions in the scene (% from left, % from top)
const MUSHROOMS = [
  {x: 6.0, y:64.2}, {x:22.3, y:85.2}, {x:23.4, y:61.4},
  {x:57.8, y:62.3}, {x:72.9, y:53.6}, {x:93.4, y:50.3},
];
const SPORE_COLORS = [
  'rgba(212,168,255', // soft purple
  'rgba(168,240,232', // pale teal
  'rgba(255,184,212', // warm pink
  'rgba(200,220,255', // pale blue
];

const _sporePool = [];
let   _sporeRaf  = null;

function spawnSpores(m) {
  if (_sporePool.length >= 60) return; // cap: skip emission if pool is full
  const sw  = $scene.offsetWidth;
  const sh  = $scene.offsetHeight;
  const cx  = m.x / 100 * sw;
  const cy  = m.y / 100 * sh;
  const now = performance.now();
  const count = 15 + Math.floor(Math.random() * 11); // 15–25

  for (let i = 0; i < count; i++) {
    const color = SPORE_COLORS[Math.floor(Math.random() * SPORE_COLORS.length)];
    const blur  = 0.3 + Math.random() * 0.8;

    // Spawn within 5px radius of mushroom cap
    const spawnA = Math.random() * Math.PI * 2;
    const spawnR = Math.random() * 5;

    // Burst: gentle radial explosion, settles in ~0.4s
    const burstA     = Math.random() * Math.PI * 2;
    const burstMag   = 15 + Math.random() * 20;   // px
    const burstDecay = 4  + Math.random() * 2;    // exp decay rate

    const el = document.createElement('div');
    el.style.cssText =
      `position:absolute;border-radius:50%;pointer-events:none;` +
      `background:${color},1);filter:blur(${blur.toFixed(1)}px);` +
      `transform:translate(-50%,-50%);opacity:0;width:3px;height:3px;`;
    $spores.appendChild(el);

    _sporePool.push({
      el,
      sx:         cx + Math.cos(spawnA) * spawnR,
      sy:         cy + Math.sin(spawnA) * spawnR,
      burstVx:    Math.cos(burstA) * burstMag,
      burstVy:    Math.sin(burstA) * burstMag,
      burstDecay,
      riseSpeed:  14 + Math.random() * 12,         // px/s upward
      wobbleAmp:  6  + Math.random() * 10,         // px (ramps up)
      wobbleFreq: 0.4 + Math.random() * 0.6,       // Hz
      wobblePhase: Math.random() * Math.PI * 2,
      startOp:    0.8 + Math.random() * 0.2,       // DEBUG: boosted opacity
      startSize:  3   + Math.random(),              // px
      endSize:    5   + Math.random(),              // px
      dur:        3000 + Math.random() * 1500,      // ms
      startTime:  now,
      done:       false,
    });
  }

  if (!_sporeRaf) _sporeRaf = requestAnimationFrame(_tickSpores);
}

function _tickSpores(now) {
  let alive = false;

  for (const p of _sporePool) {
    if (p.done) continue;

    const sec = (now - p.startTime) / 1000;  // elapsed seconds
    const t   = sec * 1000 / p.dur;          // 0..1 lifetime fraction

    if (t >= 1) { p.el.remove(); p.done = true; continue; }
    alive = true;

    // Burst: exponential decay — nearly gone by ~0.4s
    const bd = Math.exp(-p.burstDecay * sec);
    // Wobble: amplitude ramps up as particle rises (tight→spread)
    const wobRamp = Math.min(1, sec * 1.5);
    const wx = p.wobbleAmp * wobRamp * Math.sin(2 * Math.PI * p.wobbleFreq * sec + p.wobblePhase);

    const x  = p.sx + p.burstVx * bd + wx;
    const y  = p.sy + p.burstVy * bd - p.riseSpeed * sec;
    const sz = p.startSize + (p.endSize - p.startSize) * t;
    // Hold opacity for first 30%, then fade to 0 over remaining 70%
    const op = t < 0.3 ? p.startOp : p.startOp * (1 - (t - 0.3) / 0.7);

    const s = p.el.style;
    s.left    = x.toFixed(1)          + 'px';
    s.top     = y.toFixed(1)          + 'px';
    s.width   = sz.toFixed(1)         + 'px';
    s.height  = sz.toFixed(1)         + 'px';
    s.opacity = Math.max(0, op).toFixed(3);
  }

  // Compact pool
  for (let i = _sporePool.length - 1; i >= 0; i--) {
    if (_sporePool[i].done) _sporePool.splice(i, 1);
  }

  _sporeRaf = alive ? requestAnimationFrame(_tickSpores) : null;
}

function scheduleSpores() {
  spawnSpores(MUSHROOMS[Math.floor(Math.random() * MUSHROOMS.length)]);
  setTimeout(scheduleSpores, 1000 + Math.random() * 1000); // DEBUG: fast interval
}

  if (S.busy) return;
  S.feeding = true;
  MY = Math.min(100, MY + 30);
  saveMY(MY);
  floatEmoji('🍪', 7);
  sparkles($bugW, 6);
  wiggle();
  $bugI.src = 'eatingcookies.png';
  say('*nom nom nom* 🍪✨', 1000);
  setTimeout(() => {
    $bugI.src = 'cookiesgone.png';
    say('all gone!! 😋', 2000);
    setTimeout(() => {
      S.feeding = false;
      $bugI.src = baseImg();
    }, 2000);
  }, 1000);
});
